name: Update Siray Models

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  update-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update model files
        run: node getAllModel/allmodel.js

      - name: Commit and push changes
        run: |
          if git diff --quiet -- getAllModel/allmodel.response.json getAllModel/allmodel.data.json; then
            echo "No model updates detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add getAllModel/allmodel.response.json getAllModel/allmodel.data.json
          git commit -m "chore(models): update Siray model data"
          git push
